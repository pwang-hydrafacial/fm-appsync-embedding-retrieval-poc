type Query {
  retrieveMatchingDocuments(queryText: String!, topK: Int = 5, nextToken: String): RetrievalResponse!
}

type RetrievalResponse {
  queryText: String!
  hrPolicyDocuments: [HRPolicyDocument!]!
  callCenterDocuments: [CallCenterDocument!]!
  totalResults: Int
  hasMore: Boolean
  nextToken: String
}

type HRPolicyDocument {
  documentId: String!
  chunkId: String!
  text: String!
  similarityScore: Float!
  source: String
  metadata: DocumentMetadata
}

type CallCenterDocument {
  documentId: String!
  chunkId: String!
  text: String!
  similarityScore: Float!
  source: String
  metadata: DocumentMetadata
}

type DocumentMetadata {
  title: String
  category: String
  createdAt: String
  updatedAt: String
}
